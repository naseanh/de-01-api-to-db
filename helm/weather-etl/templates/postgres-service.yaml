apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "weather-etl.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "weather-etl.postgresLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: 5432