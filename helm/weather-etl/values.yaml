namespace:
  name: data-pipelines

image:
  repository: localhost:5000/weather-etl
  tag: metrics-v5
  pullPolicy: IfNotPresent

postgres:
  image: postgres:15
  database: pipeline_db
  username: pipeline_user
  password: change_me
  storage:
    size: 1Gi
  service:
    port: 5432
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

weather:
  location: "Baltimore, MD"
  latitude: "39.2904"
  longitude: "-76.6122"

etl:
  job:
    name: weather-etl-job
    backoffLimit: 3

  cronjob:
    enabled: true
    name: weather-etl-cronjob
    schedule: "*/15 * * * *"