apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: observability

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "weather-etl"

        metrics_path: /metrics

        static_configs:
          - targets:
              - metrics-server.data-pipelines.svc.cluster.local:8000